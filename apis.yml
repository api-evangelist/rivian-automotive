aid: rivian-automotive
name: Rivian Automotive
description: >-
  Rivian Automotive is an American electric vehicle manufacturer that designs
  and builds adventure-oriented electric trucks, SUVs, and commercial delivery
  vans, along with the charging infrastructure and connected-vehicle software
  that supports them. While Rivian does not publish a public developer API
  portal, an unofficial GraphQL API powers the Rivian mobile app and has been
  reverse-engineered by community projects for vehicle telemetry and control.
